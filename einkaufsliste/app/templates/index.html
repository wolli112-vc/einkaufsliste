<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einkaufsliste</title>
    <style>
        :root {
            --primary: #03a9f4;
            --bg: #fafafa;
            --card: #fff;
            --border: #e0e0e0;
            --text: #212121;
            --muted: #757575;
            --green: #4caf50;
            --red: #f44336;
            --cat-bg: #e3f2fd;
            --cat-text: #1565c0;
            --orange: #ff9800;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 1rem;
        }
        h1 { margin: 0 0 1rem 0; font-size: 1.5rem; }
        .search-wrap { margin-bottom: 1rem; display: flex; gap: .5rem; flex-wrap: wrap; }
        .search-wrap input {
            flex: 1;
            min-width: 200px;
            padding: .5rem .75rem;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        .btn-action {
            background: var(--orange);
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: .5rem 1rem;
            cursor: pointer;
            font-size: .9rem;
        }
        .btn-action:hover { opacity: .9; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        th, td {
            padding: .6rem .8rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: #f5f5f5;
            font-weight: 600;
            font-size: .9rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .03em;
        }
        .col-btns { width: 120px; text-align: center; }
        .col-qty { width: 70px; }
        .col-cat { width: 140px; }
        .btn {
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-green { background: var(--green); }
        .btn-red  { background: var(--red); }
        .btn:hover { opacity: .85; }
        .btn:active { transform: scale(.95); }
        .new-row input, .new-row select {
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: .35rem .5rem;
            width: 100%;
            font-size: .95rem;
        }
        .new-row td { vertical-align: middle; }
        .actions { display: flex; gap: .35rem; justify-content: center; }
        .save-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: .4rem .9rem;
            cursor: pointer;
            font-size: .9rem;
        }
        .save-btn:hover { opacity: .9; }
        .cat-group td {
            background: var(--cat-bg);
            color: var(--cat-text);
            font-weight: 600;
            font-size: .85rem;
            text-transform: uppercase;
            letter-spacing: .02em;
            padding: .4rem .8rem;
        }
        .cat-tag {
            display: inline-block;
            background: var(--cat-bg);
            color: var(--cat-text);
            padding: .15rem .5rem;
            border-radius: 12px;
            font-size: .85rem;
            font-weight: 500;
        }
        .cat-empty { color: var(--muted); font-style: italic; }
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--muted);
        }
        td.editable { cursor: pointer; }
        td.editable:hover { background: #f0f0f0; }
        td.editing input, td.editing select {
            width: 100%;
            font-size: .95rem;
            padding: .25rem .4rem;
            border: 1px solid var(--primary);
            border-radius: 4px;
        }
        @media (max-width: 600px) {
            th, td { padding: .4rem .5rem; font-size: .9rem; }
            .col-btns { width: 100px; }
            .col-qty, .col-cat { width: auto; }
            .btn { width: 24px; height: 24px; font-size: .85rem; }
        }
    </style>
</head>
<body>
    <h1>🛒 Einkaufsliste</h1>
    <div class="search-wrap">
        <input type="text" id="search" placeholder="Produkt oder Kategorie suchen..." autocomplete="off">
        <button class="btn-action" onclick="load()" title="Aktualisieren">🔄</button>
        <button class="btn-action" onclick="clearAll()">🗑️ Alles löschen</button>
    </div>
    <table>
        <thead>
            <tr>
                <th class="col-btns"></th>
                <th class="col-qty">Anzahl</th>
                <th>Produkt</th>
                <th class="col-cat">Kategorie</th>
            </tr>
        </thead>
        <tbody id="items-body">
            <tr><td colspan="4" class="empty-state">Lade Daten...</td></tr>
        </tbody>
        <tfoot>
            <tr class="new-row">
                <td></td>
                <td><input type="number" id="new-qty" value="1" min="1"></td>
                <td><input type="text" id="new-product" placeholder="Produktname" autocomplete="off"></td>
                <td>
                    <input list="cat-list" id="new-category" placeholder="Kategorie (optional)" autocomplete="off">
                    <datalist id="cat-list"></datalist>
                </td>
            </tr>
            <tr class="new-row">
                <td colspan="4" style="text-align:right; border:none;">
                    <button class="save-btn" onclick="addItem()">➕ Hinzufügen</button>
                </td>
            </tr>
        </tfoot>
    </table>

    <script>
        let allItems = [];
        let allCategories = [];
        let autoRefreshInterval = null;

        async function api(path, opts={}) {
            const res = await fetch('./api' + path, opts);
            if (!res.ok) throw new Error(res.statusText);
            return res.json();
        }

        async function load() {
            [allItems, allCategories] = await Promise.all([
                api('/items'),
                api('/categories')
            ]);
            updateCatList();
            render();
        }

        function isEditing() {
            return document.querySelector('td.editing') !== null;
        }

        function startAutoRefresh() {
            if (autoRefreshInterval) return;
            autoRefreshInterval = setInterval(() => {
                if (!isEditing()) load();
            }, 10000);
        }

        function updateCatList() {
            const dl = document.getElementById('cat-list');
            dl.innerHTML = '';
            allCategories.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                dl.appendChild(opt);
            });
        }

        function render() {
            const q = document.getElementById('search').value.toLowerCase();
            const tbody = document.getElementById('items-body');
            tbody.innerHTML = '';

            const filtered = allItems.filter(i =>
                i.product.toLowerCase().includes(q) ||
                (i.category || '').toLowerCase().includes(q)
            );

            if (filtered.length === 0) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td colspan="4" class="empty-state">Keine Einträge vorhanden</td>`;
                tbody.appendChild(tr);
                return;
            }

            let lastCat = null;
            filtered.forEach(item => {
                const cat = item.category || '';

                if (cat !== lastCat) {
                    const tr = document.createElement('tr');
                    tr.className = 'cat-group';
                    tr.innerHTML = `<td colspan="4">${cat ? escapeHtml(cat) : '<span class="cat-empty">Ohne Kategorie</span>'}</td>`;
                    tbody.appendChild(tr);
                    lastCat = cat;
                }

                const tr = document.createElement('tr');
                tr.dataset.id = item.id;
                tr.innerHTML = `
                    <td class="col-btns">
                        <div class="actions">
                            <button class="btn btn-green" onclick="changeQty('${item.id}', 1)">+</button>
                            <button class="btn btn-red"  onclick="changeQty('${item.id}', -1)">−</button>
                            <button class="btn btn-red" onclick="deleteItem('${item.id}')">✕</button>
                        </div>
                    </td>
                    <td class="col-qty editable" data-field="quantity" data-id="${item.id}">${item.quantity}</td>
                    <td class="editable" data-field="product" data-id="${item.id}">${escapeHtml(item.product)}</td>
                    <td class="col-cat editable" data-field="category" data-id="${item.id}">${cat ? '<span class="cat-tag">' + escapeHtml(cat) + '</span>' : '-'}</td>
                `;
                tbody.appendChild(tr);
            });

            // Klick-Handler für Inline-Edit
            tbody.querySelectorAll('td.editable').forEach(td => {
                td.addEventListener('click', function(e) {
                    if (this.classList.contains('editing')) return;
                    startEdit(this);
                });
            });
        }

        function startEdit(td) {
            const field = td.dataset.field;
            const id = td.dataset.id;
            const item = allItems.find(i => i.id === id);
            if (!item) return;

            td.classList.add('editing');
            let input;

            if (field === 'category') {
                input = document.createElement('input');
                input.type = 'text';
                input.value = item.category || '';
                input.setAttribute('list', 'cat-list');
            } else if (field === 'quantity') {
                input = document.createElement('input');
                input.type = 'number';
                input.value = item.quantity;
                input.min = 1;
            } else {
                input = document.createElement('input');
                input.type = 'text';
                input.value = item.product;
            }

            td.innerHTML = '';
            td.appendChild(input);
            input.focus();
            input.select();

            function save() {
                let value = input.value.trim();
                if (field === 'quantity') {
                    value = parseInt(value) || item.quantity;
                    if (value < 1) value = 1;
                }
                td.classList.remove('editing');
                td.innerHTML = '';

                if (value === (field === 'quantity' ? item.quantity : (item[field] || ''))) {
                    render(); // nichts geändert
                    return;
                }

                const payload = {};
                payload[field] = value;
                api(`/items/${id}`, {
                    method: 'PUT',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(payload)
                }).then(() => load()).catch(err => {
                    alert('Fehler beim Speichern: ' + err.message);
                    load();
                });
            }

            function cancel() {
                td.classList.remove('editing');
                render();
            }

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') save();
                if (e.key === 'Escape') cancel();
            });
            input.addEventListener('blur', function() {
                // kurzes Timeout, damit Klicks innerhalb der Zelle nicht als Blur zählen
                setTimeout(() => {
                    if (td.classList.contains('editing')) save();
                }, 150);
            });
        }

        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        async function changeQty(id, delta) {
            const item = allItems.find(i => i.id === id);
            if (!item) return;
            const newQty = Math.max(0, item.quantity + delta);
            await api(`/items/${id}`, {
                method: 'PUT',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({quantity: newQty})
            });
            if (newQty === 0) {
                await api(`/items/${id}`, {method: 'DELETE'});
            }
            await load();
        }

        async function deleteItem(id) {
            await api(`/items/${id}`, {method: 'DELETE'});
            await load();
        }

        async function addItem() {
            const qty = parseInt(document.getElementById('new-qty').value) || 1;
            const product = document.getElementById('new-product').value.trim();
            const category = document.getElementById('new-category').value.trim();
            if (!product) { alert('Bitte Produktname eingeben'); return; }
            await api('/items', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({quantity: qty, product, category})
            });
            document.getElementById('new-product').value = '';
            document.getElementById('new-category').value = '';
            document.getElementById('new-qty').value = '1';
            await load();
        }

        async function clearAll() {
            if (!confirm('Wirklich ALLE Einträge löschen?')) return;
            await api('/clear', {method: 'POST'});
            await load();
        }

        document.getElementById('search').addEventListener('input', render);
        document.getElementById('new-product').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') addItem();
        });
        load();
        startAutoRefresh();
    </script>
</body>
</html>
